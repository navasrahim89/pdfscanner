name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses > /dev/null 2>&1
        sdkmanager "platforms;android-34" "build-tools;34.0.0"
      env:
        ANDROID_HOME: $HOME/android-sdk
        ANDROID_SDK_ROOT: $HOME/android-sdk
    
    - name: Build APK
      run: |
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        cd scannerapp
        chmod +x gradlew
        ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: scanner-apk
        path: scannerapp/app/build/outputs/apk/debug/*.apk
