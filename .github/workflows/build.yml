name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
      with:
        path: .
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
      shell: bash
    
    - name: Build APK
      run: |
        export PATH="$HOME/android-sdk/cmdline-tools/latest/bin:$PATH"
        export ANDROID_HOME="$HOME/android-sdk"
        ls -la
        chmod +x gradlew
        ./gradlew assembleDebug
      shell: bash
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: scanner-apk
        path: app/build/outputs/apk/debug/*.apk
